# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Copy this file to each repo that builds containers:
#    .github/workflows/container.caller.yml
#
#  Customise the `paths`, `ecr_repository`, and
#  `dockerfile` inputs for each repo.
#
#  Environment prefix (dev/prod) is auto-derived from
#  the branch: dev → dev-*, main → prod-*.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Container Build & Push

on:
  push:
    branches: [dev, main]
    paths:
      - "src/**"
      - "requirements.txt"
      - "Dockerfile"
  pull_request:
    branches: [dev, main]
    paths:
      - "src/**"
      - "requirements.txt"
      - "Dockerfile"

# Cancel any in-progress run for the same branch
concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    permissions:
      id-token: write
      contents: read
    uses: byteit-ai/github-workflows/.github/workflows/container-build-push.yml@main
    with:
      registry_type: ecr
      ecr_repository: "backend"              # ← change per repo (prefix auto-derived from branch)
      # push only on merge to default branch; build-only on PRs
      push: ${{ github.event_name == 'push' }}
    secrets:
      AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}
      AWS_ROLE_ARN_PROD: ${{ secrets.AWS_ROLE_ARN_PROD }}
