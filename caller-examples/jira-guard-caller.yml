# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Copy this file to each repo:
#    .github/workflows/jira-guard.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Jira Guard

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  jira-guard:
    uses: byteit-ai/github-workflows/.github/workflows/jira-guard.yml@main
    secrets:
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
