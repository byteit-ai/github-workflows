# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Jira Guard — reusable PR quality gate + conflict scanner
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Call from any repo:
#    uses: byteit-ai/.github/.github/workflows/jira-guard.yml@main
#
#  Caller must trigger on:
#    pull_request: [opened, synchronize, reopened, closed]
#    pull_request_review: [submitted]   ← required for "changes requested" → In Progress
#    push: [dev, main, sprint*]         ← required for conflict detection
#  Debug: set repo secret ACTIONS_STEP_DEBUG=true for verbose runner logs.
#  Shell scripts honour $RUNNER_DEBUG via set -x automatically.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Jira Guard

on:
  workflow_call:
    inputs:
      jira_domain:
        description: "Jira cloud domain (e.g. mycompany.atlassian.net)"
        type: string
        default: "byteit-ai.atlassian.net"
      min_description_length:
        description: "Minimum PR body length (chars)"
        type: number
        default: 20
    secrets:
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true

jobs:
  jira-guard:
    name: Jira Guard
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 0 · Setup ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init log files
        run: touch errors.log warnings.log

      # ── 1 · Extract Jira key ──────────────────
      - name: "1 · Extract Jira key"
        id: jira_key
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          KEY=""
          # dev → main is a release PR — no Jira key required
          if [[ "$HEAD_REF" == "dev" && "$BASE_REF" == "main" ]]; then
            echo "key=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Branch formats (anchored, in priority order):
          #   PROJ-123-free_text   → capture group 1
          if [[ "$HEAD_REF" =~ ^([A-Z]+-[0-9]+)(-|$) ]]; then
            KEY="${BASH_REMATCH[1]}"
          elif [[ "$PR_TITLE" =~ (^|[^A-Z])([A-Z]+-[0-9]+)([^0-9]|$) ]]; then
            KEY="${BASH_REMATCH[2]}"
          fi

          if [ -z "$KEY" ]; then
            echo "❌ No Jira key in branch name or PR title" >> errors.log
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      # ── 2 · Jira issue exists · status = In Progress or Review ─
      - name: "2 · Jira issue & status"
        if: steps.jira_key.outputs.key != '' && github.event_name == 'pull_request' && github.event.action != 'closed'
        env:
          JIRA_KEY: ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          HTTP=$(curl -s -o jira_response.json -w "%{http_code}" \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY")

          if [ "$HTTP" -ne 200 ]; then
            echo "❌ Jira issue $JIRA_KEY not found (HTTP $HTTP)" >> errors.log
            exit 0
          fi

          STATUS=$(jq -r '.fields.status.name' jira_response.json)

          if [ "$STATUS" == "In Progress" ]; then
            # Auto-transition to Review
            TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")
            TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.name=="InProgress2Review") | .id' | head -1)
            if [ -z "$TRANS_ID" ]; then
              echo "❌ Could not find 'InProgress2Review' transition for $JIRA_KEY (available: $(echo \"$TRANS\" | jq -r '[.transitions[].name] | join(\", \")'))" >> errors.log
            else
              curl -sf -X POST \
                -u "$JIRA_EMAIL:$JIRA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
                "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions"
              echo "✅ Transitioned $JIRA_KEY: 'In Progress' → 'Review'"
            fi
          elif [ "$STATUS" != "Review" ]; then
            echo "❌ Issue status is '$STATUS', expected 'In Progress' or 'Review'" >> errors.log
          fi

      # ── 2b · Transition to DONE on PR merge ──────
      - name: "2b · Transition to DONE on merge"
        if: steps.jira_key.outputs.key != '' && github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          JIRA_KEY: ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")
          # Try named transition first, then fall back to any transition whose target is "Done"
          TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.name=="Review2Done") | .id' | head -1)
          if [ -z "$TRANS_ID" ]; then
            TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.to.name=="Done") | .id' | head -1)
          fi
          if [ -z "$TRANS_ID" ]; then
            echo "⚠️  Could not find a transition to 'Done' for $JIRA_KEY (available: $(echo "$TRANS" | jq -r '[.transitions[].name] | join(", ")'))" >> warnings.log
          else
            FROM_STATUS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY" | jq -r '.fields.status.name')
            curl -sf -X POST \
              -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions"
            echo "✅ Transitioned $JIRA_KEY: '$FROM_STATUS' → 'Done'"
          fi

      # ── 2c · Transition back to In Progress on changes requested ──
      - name: "2c · Back to In Progress on changes requested"
        if: steps.jira_key.outputs.key != '' && github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
        env:
          JIRA_KEY: ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
          TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")
          # Try named transition first, then fall back to any transition whose target is "In Progress"
          TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.name=="Review2InProgress") | .id' | head -1)
          if [ -z "$TRANS_ID" ]; then
            TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.to.name=="In Progress") | .id' | head -1)
          fi
          if [ -z "$TRANS_ID" ]; then
            echo "⚠️  Could not find 'Review2InProgress' transition for $JIRA_KEY (available: $(echo "$TRANS" | jq -r '[.transitions[].name] | join(", ")')" >> warnings.log
          else
            curl -sf -X POST \
              -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions"
            echo "✅ Transitioned $JIRA_KEY: 'Review' → 'In Progress' (changes requested by $REVIEWER)"
          fi

          # ── Post review summary comment to Jira ──
          # Read review body safely from the event payload (avoids shell-injection from $ {{ }} substitution)
          REVIEW_BODY=$(jq -r '.review.body // ""' "$GITHUB_EVENT_PATH")
          if [ -n "$REVIEW_BODY" ]; then
            PAYLOAD=$(jq -n \
              --arg reviewer "$REVIEWER" \
              --arg body "$REVIEW_BODY" \
              '{body: {version: 1, type: "doc", content: [{type: "paragraph", content: [{type: "text", text: ("🔄 Changes requested by " + $reviewer + ":\n\n" + $body)}]}]}}')
            curl -sf -X POST \
              -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/comment" || \
              echo "⚠️  Failed to post review comment to Jira" >> warnings.log
            echo "✅ Posted review summary comment to $JIRA_KEY"
          fi

      # ── 3 · Blocking dependencies must be DONE ─
      - name: "3 · Jira dependencies"
        if: steps.jira_key.outputs.key != ''
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          [ ! -f jira_response.json ] && exit 0

          # Only pick up links where THIS issue is blocked by another (inward direction).
          # Outward "Blocks" links (this issue blocks something else) must NOT block the PR.
          BLOCKERS=$(jq -r '
            .fields.issuelinks[]?
            | select(.type.name=="Blocks" and (.inwardIssue != null))
            | .inwardIssue.key
          ' jira_response.json 2>/dev/null)

          OPEN=""
          for B in $BLOCKERS; do
            RESP=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$B" 2>/dev/null) || continue
            B_STATUS=$(echo "$RESP" | jq -r '.fields.status.name')
            B_STATUS_LOWER=$(echo "$B_STATUS" | tr '[:upper:]' '[:lower:]')
            if [ "$B_STATUS_LOWER" != "done" ]; then
              OPEN="$OPEN $B ($B_STATUS)"
            fi
          done

          if [ -n "$OPEN" ]; then
            echo "❌ Blocked by unresolved dependencies:$OPEN" >> errors.log
          fi

      # ── 4 · Sensitive / secret file scan ───────
      - name: "4 · Sensitive file scan"
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "origin/$BASE_REF"..."$HEAD_SHA" 2>/dev/null || true)

          # Patterns that should never appear in a PR
          DENY='(\.env(\..*)?|\.pem|\.key|\.p12|\.pfx|\.keystore|\.jks|\.secret|\.secrets|\.npmrc|\.pypirc|id_rsa|id_ed25519|id_dsa|credentials|service[-_]account.*\.json)$'

          FLAGGED=""
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            BASENAME=$(basename "$FILE")
            if [[ "$BASENAME" =~ $DENY ]]; then
              FLAGGED="${FLAGGED}  • ${FILE}\n"
            fi
          done <<< "$CHANGED"

          if [ -n "$FLAGGED" ]; then
            echo "❌ Sensitive files detected in PR:" >> errors.log
            echo -e "$FLAGGED" >> errors.log
          fi

      # ── 5 · PR description ────────────────────
      - name: "5 · PR description"
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          LEN=${#PR_BODY}
          if [ "$LEN" -lt ${{ inputs.min_description_length }} ]; then
            echo "⚠️  PR description too short ($LEN chars, min ${{ inputs.min_description_length }})" >> warnings.log
          fi

      # ── 6 · Branch policy ─────────────────────
      - name: "6 · Branch policy"
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Release PR: dev → main is always allowed
          if [[ "$HEAD_REF" == "dev" && "$BASE_REF" == "main" ]]; then
            exit 0
          fi

          # Feature branches must target dev
          if [[ "$HEAD_REF" =~ ^[A-Z]+-[0-9]+ ]]; then
            if [[ "$BASE_REF" != "dev" ]]; then
              echo "❌ Branch '$HEAD_REF' must target 'dev', not '$BASE_REF'" >> errors.log
            fi
          # Any other branch targeting main is forbidden
          elif [[ "$BASE_REF" == "main" ]]; then
            echo "❌ Only 'dev' can merge into 'main' (got '$HEAD_REF')" >> errors.log
          fi

      # ── 📋 Final report ───────────────────────
      - name: "📋 Summary"
        if: always()
        run: |
          (
            echo "## 🛡️ Jira Guard"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Jira key | \`${{ steps.jira_key.outputs.key || 'n/a' }}\` |"
            echo "| Event | \`${{ github.event_name }}\` / \`${{ github.event.action }}\` |"
            echo "| Branch | \`${{ github.event.pull_request.head.ref }}\` → \`${{ github.event.pull_request.base.ref }}\` |"
            echo ""
            if [ -s warnings.log ]; then
              echo "### ⚠️  Warnings"
              cat warnings.log
              echo ""
            fi
            if [ -s errors.log ]; then
              echo "### ❌ Errors"
              cat errors.log
            else
              echo "### ✅ All checks passed"
            fi
          ) | tee -a "$GITHUB_STEP_SUMMARY"

          if [ -s errors.log ]; then
            exit 1
          fi

  # ── Conflict scanner — runs on push only ─────────────────────────────────
  conflict-check:
    name: Conflict Check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
      contents: read

    steps:
      - name: Scan open PRs for merge conflicts
        env:
          GH_TOKEN: ${{ github.token }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
          REPO: ${{ github.repository }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x

          PRS=$(gh api "repos/$REPO/pulls?state=open&per_page=100")
          CONFLICT_COUNT=0

          while IFS= read -r PR; do
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            HEAD_REF=$(echo "$PR"  | jq -r '.head.ref')
            BASE_REF=$(echo "$PR"  | jq -r '.base.ref')

            # Skip dev→main release PRs
            [[ "$HEAD_REF" == "dev" && "$BASE_REF" == "main" ]] && continue

            # GitHub computes mergeability lazily — retry up to 5 times
            MERGEABLE="null"
            for i in $(seq 1 5); do
              PR_DETAIL=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
              MERGEABLE=$(echo "$PR_DETAIL" | jq -r '.mergeable')
              MERGEABLE_STATE=$(echo "$PR_DETAIL" | jq -r '.mergeable_state')
              [[ "$MERGEABLE" != "null" ]] && break
              sleep 6
            done

            [[ "$MERGEABLE" != "false" && "$MERGEABLE_STATE" != "dirty" ]] && continue

            echo "⚠️  PR #$PR_NUMBER ($HEAD_REF → $BASE_REF) has conflicts"
            CONFLICT_COUNT=$((CONFLICT_COUNT + 1))

            # Extract Jira key from branch name
            KEY=""
            [[ "$HEAD_REF" =~ ^([A-Z]+-[0-9]+)(-|$) ]] && KEY="${BASH_REMATCH[1]}"
            [ -z "$KEY" ] && echo "  ↳ No Jira key found, skipping" && continue

            # Fetch Jira issue
            HTTP=$(curl -s -o "jira_${KEY}.json" -w "%{http_code}" \
              -u "$JIRA_EMAIL:$JIRA_TOKEN" -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$KEY")
            [ "$HTTP" -ne 200 ] && echo "  ↳ $KEY not found (HTTP $HTTP)" && continue

            ASSIGNEE_ID=$(jq -r '.fields.assignee.accountId // ""' "jira_${KEY}.json")

            # Transition to In Progress
            TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$KEY/transitions")
            TRANS_ID=$(echo "$TRANS" | jq -r '
              .transitions[] | select(.name=="Review2InProgress" or .to.name=="In Progress") | .id
            ' | head -1)
            if [ -n "$TRANS_ID" ]; then
              curl -s -o /dev/null -X POST -u "$JIRA_EMAIL:$JIRA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
                "https://$JIRA_DOMAIN/rest/api/3/issue/$KEY/transitions"
              echo "  ↳ $KEY → In Progress"
            fi

            # Post comment with @mention if assignee exists
            PR_URL="${GITHUB_SERVER_URL}/$REPO/pull/$PR_NUMBER"
            if [ -n "$ASSIGNEE_ID" ]; then
              PAYLOAD=$(jq -n \
                --arg pr_url "$PR_URL" --arg pr_num "$PR_NUMBER" --arg id "$ASSIGNEE_ID" \
                '{body:{version:1,type:"doc",content:[{type:"paragraph",content:[
                  {type:"mention",attrs:{id:$id,text:"@assignee",accessLevel:"APPLICATION"}},
                  {type:"text",text:(" PR #"+$pr_num+" has merge conflicts: "+$pr_url)}
                ]}]}}')
            else
              PAYLOAD=$(jq -n \
                --arg pr_url "$PR_URL" --arg pr_num "$PR_NUMBER" \
                '{body:{version:1,type:"doc",content:[{type:"paragraph",content:[
                  {type:"text",text:("⚠️ PR #"+$pr_num+" has merge conflicts: "+$pr_url)}
                ]}]}}')
            fi
            curl -s -o /dev/null -X POST -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Content-Type: application/json" -d "$PAYLOAD" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$KEY/comment"
            echo "  ↳ Comment posted to $KEY"

          done < <(echo "$PRS" | jq -c '.[]')

          echo "## 🔀 Conflict Check — $CONFLICT_COUNT conflicting PR(s) found" >> "$GITHUB_STEP_SUMMARY"

