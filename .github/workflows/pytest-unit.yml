# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Pytest Unit — reusable workflow
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Purpose:
#  - Run unit tests only by default (tests/unit)
#  - Skip when pytest.ini is missing
#  - Fail only when pytest.ini exists but tests/unit is missing
#  - Reuse across ByteIT repos through workflow_call
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Pytest Unit

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version used to run unit tests"
        type: string
        default: "3.12"
  workflow_dispatch:

jobs:
  pytest-unit:
    name: Pytest Unit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Validate repository unit-test structure
        id: validate_unit_tests
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x

          if [ ! -f "pytest.ini" ]; then
            echo "ℹ️ pytest.ini not found, skipping unit-test run"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -d "tests/unit" ]; then
            echo "❌ tests/unit is required when pytest.ini exists" >&2
            exit 1
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        if: steps.validate_unit_tests.outputs.skip == 'false'
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          else
            echo "❌ No requirements.txt or pyproject.toml found for dependency install" >&2
            exit 1
          fi

          pip install pytest

      - name: Run pytest unit tests
        if: steps.validate_unit_tests.outputs.skip == 'false'
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x

          pytest tests/unit

  notify-failure:
    name: AdolfoBOT — Notify Failure
    needs: [pytest-unit]
    if: failure() && secrets.JIRA_EMAIL != '' && secrets.JIRA_API_TOKEN != ''
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Pytest Unit"
      extra_context: |
        Unit-test workflow failed.
        Verify pytest.ini exists and tests/unit contains passing tests.
    secrets: inherit
