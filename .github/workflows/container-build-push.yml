name: Container Build & Push

on:
  workflow_call:
    inputs:
      registry_type:
        description: "Target registry: ecr | dockerhub"
        type: string
        required: true
      aws_region:
        description: "AWS region for ECR"
        type: string
        default: "eu-central-1"
      ecr_repository:
        description: "ECR repo name (without env prefix)"
        type: string
        default: ""
      ecr_repository_full_name:
        description: "Exact ECR repo name (overrides ecr_repository + prefix)"
        type: string
        default: ""
      environment_prefix:
        description: "ECR env prefix: dev | prod (auto-derived from branch if empty)"
        type: string
        default: ""
      dockerhub_repository:
        description: "DockerHub repository (e.g. org/myapp)"
        type: string
        default: ""
      dockerfile:
        type: string
        default: "Dockerfile"
      context:
        type: string
        default: "."
      build_args:
        description: "Multi-line build-args (KEY=VALUE per line)"
        type: string
        default: ""
      platforms:
        type: string
        default: "linux/amd64"
      target:
        description: "Docker build target stage"
        type: string
        default: ""
      push:
        description: "Push the image (false = build-only)"
        type: boolean
        default: true
      tag_suffix:
        description: "Optional suffix appended to the image tag"
        type: string
        default: ""
      extra_tags:
        description: "Extra tags (newline-separated, full image:tag format)"
        type: string
        default: ""
      cache_key_prefix:
        description: "GHA cache key prefix"
        type: string
        default: "docker"
      write_cache:
        description: "Cache write policy: auto | true | false"
        type: string
        default: "auto"

    secrets:
      AWS_ROLE_ARN_DEV: { required: false }
      AWS_ROLE_ARN_PROD: { required: false }
      ECR_REGISTRY_DEV: { required: false }
      ECR_REGISTRY_PROD: { required: false }
      ECR_REGISTRY: { required: false }
      DOCKERHUB_USERNAME: { required: false }
      DOCKERHUB_TOKEN: { required: false }

    outputs:
      image_tag:
        description: "Primary image tag that was built"
        value: ${{ jobs.build-push.outputs.image_tag }}
      full_image:
        description: "Full image URI (registry/repo:tag)"
        value: ${{ jobs.build-push.outputs.full_image }}

permissions:
  contents: read
  id-token: write

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.resolve.outputs.tag }}
      full_image: ${{ steps.resolve.outputs.full_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolves tag, registry, repo, AWS role — single source of truth
      - name: Resolve image metadata
        id: resolve
        env:
          ENV_PREFIX_INPUT: ${{ inputs.environment_prefix }}
          REGISTRY_TYPE: ${{ inputs.registry_type }}
          ECR_REPO: ${{ inputs.ecr_repository }}
          ECR_REPO_FULL: ${{ inputs.ecr_repository_full_name }}
          DOCKERHUB_REPO: ${{ inputs.dockerhub_repository }}
          TAG_SUFFIX: ${{ inputs.tag_suffix }}
          EXTRA_TAGS: ${{ inputs.extra_tags }}
          PUSH: ${{ inputs.push }}
          AWS_ROLE_ARN_DEV: ${{ secrets.AWS_ROLE_ARN_DEV }}
          AWS_ROLE_ARN_PROD: ${{ secrets.AWS_ROLE_ARN_PROD }}
          ECR_REGISTRY_DEV: ${{ secrets.ECR_REGISTRY_DEV }}
          ECR_REGISTRY_PROD: ${{ secrets.ECR_REGISTRY_PROD }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x

          # Tag
          SHA7="${GITHUB_SHA::7}"
          TARGET_BRANCH="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          SAFE_BRANCH=$(echo "$TARGET_BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-50)
          TAG_PREFIX=$([ "$SAFE_BRANCH" = "main" ] && echo "prod" || echo "$SAFE_BRANCH")
          TAG="${TAG_PREFIX}${TAG_SUFFIX:+-${TAG_SUFFIX}}-${SHA7}"

          # ECR: env prefix, role, registry, repo
          if [ "$REGISTRY_TYPE" = "ecr" ]; then
            ENV_PREFIX="${ENV_PREFIX_INPUT:-$([ "$TAG_PREFIX" = "prod" ] && echo "prod" || echo "dev")}"
            case "$ENV_PREFIX" in
              prod) AWS_ROLE="${AWS_ROLE_ARN_PROD}"; REGISTRY="${ECR_REGISTRY_PROD:-$ECR_REGISTRY}" ;;
              dev)  AWS_ROLE="${AWS_ROLE_ARN_DEV}";  REGISTRY="${ECR_REGISTRY_DEV:-$ECR_REGISTRY}" ;;
              *)    echo "Unknown environment_prefix '$ENV_PREFIX'" >&2; exit 1 ;;
            esac
            [ "$PUSH" = "true" ] && [ -z "$AWS_ROLE" ] && { echo "Missing AWS role for '$ENV_PREFIX'" >&2; exit 1; }
            REPO="${ECR_REPO_FULL:-${ENV_PREFIX}-${ECR_REPO}}"
            BASE="${REGISTRY}/${REPO}"
            echo "env_prefix=${ENV_PREFIX}"   >> "$GITHUB_OUTPUT"
            echo "aws_role_arn=${AWS_ROLE}"   >> "$GITHUB_OUTPUT"
            echo "registry=${REGISTRY}"       >> "$GITHUB_OUTPUT"
            echo "repo=${REPO}"               >> "$GITHUB_OUTPUT"
          else
            BASE="$DOCKERHUB_REPO"
          fi

          # Tags list
          TAGS="${BASE}:${TAG}
          ${BASE}:${TAG_PREFIX}-latest${EXTRA_TAGS:+
          ${EXTRA_TAGS}}"

          echo "tag=${TAG}"                   >> "$GITHUB_OUTPUT"
          echo "full_image=${BASE}:${TAG}"    >> "$GITHUB_OUTPUT"
          { echo "tags<<EOF"; echo "$TAGS"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: inputs.registry_type == 'ecr' && inputs.push == true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.resolve.outputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: inputs.registry_type == 'ecr' && inputs.push == true
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to DockerHub
        if: inputs.registry_type == 'dockerhub' && inputs.push
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        if: contains(inputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.resolve.outputs.tags }}
          build-args: ${{ inputs.build_args }}
          platforms: ${{ inputs.platforms }}
          target: ${{ inputs.target }}
          cache-from: type=gha,scope=${{ inputs.cache_key_prefix }}
          cache-to: >-
            ${{ (inputs.write_cache == 'true' || (inputs.write_cache == 'auto'
            &&
                github.event_name == 'push' && contains(fromJSON('["main","dev"]'), github.ref_name))) &&
                format('type=gha,mode=max,scope={0}', inputs.cache_key_prefix) || '' }}
          provenance: false

      - name: Build summary
        run: |
          {
            echo "### 🐳 Container Build Summary"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Registry    | \`${{ inputs.registry_type }}\` |"
            echo "| Tag         | \`${{ steps.resolve.outputs.tag }}\` |"
            echo "| Pushed      | \`${{ inputs.push }}\` |"
            echo "| Dockerfile  | \`${{ inputs.dockerfile }}\` |"
            echo "| Environment | \`${{ steps.resolve.outputs.env_prefix || 'n/a' }}\` |"
            echo "| Cache scope | \`${{ inputs.cache_key_prefix }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
