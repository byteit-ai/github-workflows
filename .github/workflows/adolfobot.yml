# ╔══════════════════════════════════════════════════════════════════╗
# ║                     🤖  A D O L F O B O T                       ║
# ║          Centralised Jira notifier for all ByteIT workflows      ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#  AdolfoBOT is the single place that posts Jira comments and rolls
#  issues back to "In Progress" across every workflow in this repo.
#  Never duplicate Jira comment / transition logic inside a workflow —
#  delegate to AdolfoBOT instead.
#
#  Modes
#  ─────
#  failure (default) — triggered with `if: failure()` as a final job.
#    Transitions the issue back to In Progress and posts a failure
#    summary with the run URL and optional extra context.
#
#  comment — post any informational comment to Jira without a
#    status transition. Pass jira_key_override + comment_body.
#
#  Usage — failure mode (add as last job in any workflow):
#
#    notify-failure:
#      name: AdolfoBOT — Notify Failure
#      needs: [<your-job-name>]
#      if: failure()
#      uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
#      with:
#        workflow_name: "My Workflow"
#        extra_context: |          # optional per-workflow hint
#          - Step X failed because Y
#      secrets: inherit
#
#  Usage — comment mode (post a Jira comment from any job):
#
#    post-my-comment:
#      name: AdolfoBOT — Post Comment
#      needs: [prepare-step]   # job that outputs jira_key + comment
#      uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
#      with:
#        workflow_name: "My Workflow"
#        mode: "comment"
#        jira_key_override: ${{ needs.prepare-step.outputs.jira_key }}
#        comment_body: ${{ needs.prepare-step.outputs.comment }}
#      secrets: inherit
#
#  ⚠️  BYPASS POLICY
#  Bypassing any automated workflow must be a deliberate exception,
#  not a shortcut. Every bypass requires explicit manual approval
#  from a team lead before merging. This rule exists to protect
#  everyone: a skipped check today becomes a production incident
#  tomorrow, costing far more time for the whole team than fixing the
#  root issue would have. When pipelines stay green, reviews are
#  faster, deployments are safer, and nobody gets woken up at 2am. 🙏
#
#  Debug: set repo secret ACTIONS_STEP_DEBUG=true for verbose logs.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: AdolfoBOT

on:
  workflow_call:
    inputs:
      workflow_name:
        description: "Human-readable name of the calling workflow (used in Jira comment)"
        type: string
        required: true
      extra_context:
        description: "Optional per-workflow explanation lines added to the Jira comment (failure mode)"
        type: string
        default: ""
      mode:
        description: "'failure' — transition to In Progress + post failure message. 'comment' — post comment_body only, no transition."
        type: string
        default: "failure"
      jira_key_override:
        description: "Explicit Jira key, skipping branch-name auto-detection. Required for mode=comment."
        type: string
        default: ""
      comment_body:
        description: "Full comment text when mode=comment. Ignored in failure mode (failure message is auto-built)."
        type: string
        default: ""
      jira_domain:
        description: "Jira cloud domain (e.g. mycompany.atlassian.net)"
        type: string
        default: "byteit-ai.atlassian.net"
    secrets:
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true

jobs:
  adolfobot:
    name: AdolfoBOT — Notify Failure
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 0 · Setup ─────────────────────────────
      - name: Init log files
        run: touch warnings.log errors.log

      # ── 1 · Resolve Jira key (override takes priority) ──────────────────
      - name: "[AdolfoBOT] Resolve Jira key"
        id: jira_key
        env:
          KEY_OVERRIDE: ${{ inputs.jira_key_override }}
          # PR events populate head.ref; push events populate ref_name
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          if [ -n "$KEY_OVERRIDE" ]; then
            echo "key=$KEY_OVERRIDE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="${HEAD_REF:-$REF_NAME}"
          KEY=""
          if [[ "$BRANCH" =~ ^([A-Z]+-[0-9]+)(-|$) ]]; then
            KEY="${BASH_REMATCH[1]}"
          fi
          if [ -z "$KEY" ]; then
            echo "⚠️  No Jira key found in branch '$BRANCH' and no override provided — skipping Jira update"
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      # ── 2 · Fetch Jira assignee ───────────────────────────────────────────
      - name: "[AdolfoBOT] Fetch Jira assignee"
        id: assignee
        if: steps.jira_key.outputs.key != ''
        env:
          JIRA_KEY:    ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL:  ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          HTTP=$(curl -s -o issue.json -w "%{http_code}" \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY?fields=assignee")
          if [ "$HTTP" -eq 200 ]; then
            echo "account_id=$(jq -r '.fields.assignee.accountId // ""' issue.json)" >> "$GITHUB_OUTPUT"
            echo "display_name=$(jq -r '.fields.assignee.displayName // ""' issue.json)" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  [AdolfoBOT] Failed to fetch assignee for $JIRA_KEY (HTTP $HTTP)" >> warnings.log
            echo "account_id=" >> "$GITHUB_OUTPUT"
            echo "display_name=" >> "$GITHUB_OUTPUT"
          fi

      # ── 3 · Transition to In Progress (failure mode only) ─────────────────
      - name: "[AdolfoBOT] Transition to In Progress"
        if: steps.jira_key.outputs.key != '' && inputs.mode == 'failure'
        env:
          JIRA_KEY:    ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL:  ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x

          HTTP=$(curl -s -o jira_trans.json -w "%{http_code}" \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")

          if [ "$HTTP" -ne 200 ]; then
            echo "⚠️  [AdolfoBOT] Failed to fetch transitions for $JIRA_KEY (HTTP $HTTP)" >> warnings.log
            exit 0
          fi

          TRANS_ID=$(jq -r '
            .transitions[]
            | select(
                .name == "ToDo2InProgress"
                or .name == "Review2InProgress"
                or .to.name == "In Progress"
              )
            | .id
          ' jira_trans.json | head -1)

          if [ -n "$TRANS_ID" ]; then
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")
            if [ "$HTTP" -eq 204 ] || [ "$HTTP" -eq 200 ]; then
              echo "✅ [AdolfoBOT] Transitioned $JIRA_KEY → In Progress"
            else
              echo "⚠️  [AdolfoBOT] Failed to transition $JIRA_KEY (HTTP $HTTP)" >> warnings.log
            fi
          else
            echo "⚠️  [AdolfoBOT] No 'In Progress' transition available for $JIRA_KEY (available: $(jq -r '[.transitions[].name] | join(\", \")' jira_trans.json))"
          fi

      # ── 4 · Post Jira comment ─────────────────────────────────────────────
      - name: "[AdolfoBOT] Post Jira comment"
        if: steps.jira_key.outputs.key != ''
        env:
          JIRA_KEY:      ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL:    ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN:    ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN:   ${{ inputs.jira_domain }}
          MODE:          ${{ inputs.mode }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          EXTRA_CONTEXT: ${{ inputs.extra_context }}
          COMMENT_BODY:  ${{ inputs.comment_body }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ASSIGNEE_ID:   ${{ steps.assignee.outputs.account_id }}
          ASSIGNEE_NAME: ${{ steps.assignee.outputs.display_name }}
        run: |
          python3 - << 'PYEOF'
          import json, os, sys, urllib.request, urllib.error, base64

          MODE         = os.environ.get("MODE", "failure")
          JIRA_KEY     = os.environ.get("JIRA_KEY", "")
          JIRA_EMAIL   = os.environ.get("JIRA_EMAIL", "")
          JIRA_TOKEN   = os.environ.get("JIRA_TOKEN", "")
          JIRA_DOMAIN  = os.environ.get("JIRA_DOMAIN", "")
          WORKFLOW     = os.environ.get("WORKFLOW_NAME", "")
          EXTRA        = os.environ.get("EXTRA_CONTEXT", "")
          BODY         = os.environ.get("COMMENT_BODY", "")
          RUN_URL      = os.environ.get("RUN_URL", "")
          ASSIGNEE_ID  = os.environ.get("ASSIGNEE_ID", "")
          ASSIGNEE_NAME = os.environ.get("ASSIGNEE_NAME", "")

          def t(text, *marks):
            node = {"type": "text", "text": text}
            if marks:
              node["marks"] = [{"type": m} if isinstance(m, str) else m for m in marks]
            return node

          def bold(text): return t(text, "strong")
          def em(text):   return t(text, "em")
          def link(text, href): return t(text, {"type": "link", "attrs": {"href": href}})
          def mention(uid, name): return {"type": "mention", "attrs": {"id": uid, "text": f"@{name}"}}
          def p(*nodes): return {"type": "paragraph", "content": list(nodes)}
          def rule(): return {"type": "rule"}

          header = [t("[AdolfoBOT] says")]
          if ASSIGNEE_ID:
            header += [t(" to "), mention(ASSIGNEE_ID, ASSIGNEE_NAME)]
          header.append(t(":"))
          content = [p(*header)]

          if MODE == "comment":
            for line in BODY.split("\n"):
              content.append(p(t(line or " ")))
          else:
            content.append(p(t("❌ "), bold(WORKFLOW), t(" failed on GitHub Actions.")))
            content.append(p(link("→ View run", RUN_URL)))
            if EXTRA.strip():
              content.append(rule())
              for line in EXTRA.split("\n"):
                if line.strip():
                  content.append(p(t(line)))
            content.append(rule())
            content.append(p(em(
              "ℹ️ Exceptionally, bypassing is possible with AdolfoNonBOT approval. "
              "Having full green pipelines = faster dev & reviews, safer deploys. 🙏"
            )))

          adf = {"version": 1, "type": "doc", "content": content}
          payload = json.dumps({"body": adf}).encode()
          creds = base64.b64encode(f"{JIRA_EMAIL}:{JIRA_TOKEN}".encode()).decode()
          req = urllib.request.Request(
            f"https://{JIRA_DOMAIN}/rest/api/3/issue/{JIRA_KEY}/comment",
            data=payload,
            headers={
              "Authorization": f"Basic {creds}",
              "Content-Type":  "application/json",
              "Accept":        "application/json",
            },
            method="POST",
          )
          try:
            with urllib.request.urlopen(req) as resp:
              print(f"✅ [AdolfoBOT] Comment posted to {JIRA_KEY} (HTTP {resp.status})")
          except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"⚠️  [AdolfoBOT] Failed to post comment to {JIRA_KEY} (HTTP {e.code}): {body}", file=sys.stderr)
            with open("warnings.log", "a") as f:
              f.write(f"⚠️  [AdolfoBOT] Failed to post comment to {JIRA_KEY} (HTTP {e.code})\n")
            sys.exit(1)
          PYEOF

      # ── 5 · Step summary ─────────────────────────────────────────────────
      - name: "[AdolfoBOT] Summary"
        if: always()
        env:
          JIRA_KEY:      ${{ steps.jira_key.outputs.key }}
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          MODE:          ${{ inputs.mode }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JIRA_DOMAIN:   ${{ inputs.jira_domain }}
        run: |
          {
            echo "## 🤖 AdolfoBOT"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Mode | \`${MODE}\` |"
            echo "| Calling workflow | \`${WORKFLOW_NAME}\` |"
            echo "| Jira key | \`${JIRA_KEY:-n/a}\` |"
            echo "| Jira URL | ${JIRA_KEY:+https://${JIRA_DOMAIN}/browse/${JIRA_KEY}} |"
            echo "| Run URL | ${RUN_URL} |"
          } >> "$GITHUB_STEP_SUMMARY"
