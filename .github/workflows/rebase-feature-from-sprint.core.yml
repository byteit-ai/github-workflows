# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Rebase feature branch from sprint — reusable
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Call from any repo:
#    uses: byteit-ai/.github/.github/workflows/rebase-feature-from-sprint.core.yml@main
#
#  Debug: set repo secret ACTIONS_STEP_DEBUG=true for verbose runner logs.
#  Shell scripts honour $RUNNER_DEBUG via set -x automatically.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Rebase Feature from Sprint

on:
  workflow_call:
    inputs:
      # ── Notifications ───────────────────────────
      notification_email:
        description: "E-mail address to notify on failure or timeout (leave empty to skip)"
        type: string
        default: ""
    secrets:
      # ── SMTP (required only when notification_email is set) ──
      SMTP_SERVER:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false

permissions:
  contents: write

jobs:
  rebase-feature-from-sprint:
    name: rebase-feature-from-sprint
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ----------------------------
      # Checkout SIEMPRE primero
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get branch name
        id: vars
        run: |
          echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      # ----------------------------
      # Parse branch (LOGICA CORRECTA)
      # ----------------------------
      - name: Parse feature branch
        id: parse
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          BRANCH="${{ steps.vars.outputs.branch }}"

          if [[ "$BRANCH" =~ ^sprint([0-9]+)-([A-Z]+-[0-9]+)-(.*)$ ]]; then
            SPRINT="${BASH_REMATCH[1]}"
            TICKET="${BASH_REMATCH[2]}"
            DESCRIPTION="${BASH_REMATCH[3]}"
            PREV_SPRINT=$((SPRINT - 1))

            echo "matched=true" >> "$GITHUB_OUTPUT"
            echo "sprint=$SPRINT" >> "$GITHUB_OUTPUT"
            echo "ticket=$TICKET" >> "$GITHUB_OUTPUT"
            echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"
            echo "prev_sprint=$PREV_SPRINT" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if invalid branch
        if: steps.parse.outputs.matched == 'false'
        run: |
          echo "❌ Invalid branch name. Exiting."
          exit 1

      # ----------------------------
      # Git config
      # ----------------------------
      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      # ============================
      # FIRST REBASE: sprintX
      # ============================
      - name: Rebase onto sprint branch (if exists)
        run: |
          SPRINT_BRANCH="sprint${{ steps.parse.outputs.sprint }}"

          if git ls-remote --heads origin "$SPRINT_BRANCH" | grep -q "$SPRINT_BRANCH"; then
            echo "✔ Rebasing onto $SPRINT_BRANCH"
            git fetch origin "$SPRINT_BRANCH"
            git rebase "origin/$SPRINT_BRANCH"
          else
            echo "ℹ Sprint branch not found, skipping"
          fi

      # ============================
      # SECOND REBASE: previous sprint feature
      # ============================
      - name: Rebase onto previous sprint feature (if exists)
        run: |
          PREV_BRANCH="sprint${{ steps.parse.outputs.prev_sprint }}-${{ steps.parse.outputs.ticket }}-${{ steps.parse.outputs.description }}"

          if git ls-remote --heads origin "$PREV_BRANCH" | grep -q "$PREV_BRANCH"; then
            echo "✔ Rebasing onto $PREV_BRANCH"
            git fetch origin "$PREV_BRANCH"
            git rebase "origin/$PREV_BRANCH"
          else
            echo "ℹ Previous sprint feature not found, skipping"
          fi

      # ============================
      # PUSH
      # ============================
      - name: Push rebased branch
        run: |
          git push --force-with-lease origin "${{ steps.vars.outputs.branch }}"

      - name: "✅ Done"
        run: |
          echo "✔️ Feature branch rebased successfully"
          {
            echo "## 🔀 Rebase Feature from Sprint"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Branch | \`${{ steps.vars.outputs.branch }}\` |"
            echo "| Sprint | \`${{ steps.parse.outputs.sprint }}\` |"
            echo "| Ticket | \`${{ steps.parse.outputs.ticket }}\` |"
            echo "| Status | ✅ Rebased successfully |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Failure / timeout notification ────────
      - name: Notify on failure or timeout
        if: failure() && inputs.notification_email != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Workflow failed / timed out: ${{ github.workflow }} (${{ github.repository }})"
          to: ${{ inputs.notification_email }}
          from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          body: |
            The workflow exceeded its time limit or encountered an error and was stopped.

            Workflow:   ${{ github.workflow }}
            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Triggered:  ${{ github.event_name }}
            Run URL:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
